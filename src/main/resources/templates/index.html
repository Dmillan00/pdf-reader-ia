<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Asistente IA para lectura de PDF</title>
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="navbar navbar-dark bg-dark shadow-sm btn">
        <div class="container-fluid justify-content-center">
            <h1 class="navbar-brand fs-3 my-2">Asistente IA para lectura de PDF</h1>
        </div>
    </header>

    <div class="container flex-grow-1 my-5">
        <div class="row align-items-stretch g-4">

            <div class="col-md-5 d-flex">
                <div
                    class="contenedor-subir-pdf card w-100 p-4 d-flex flex-column justify-content-center align-items-center text-center">
                    <h2 class="mb-4">Sube tu PDF</h2>

                    <form th:action="@{/cargar-pdf}" method="post" enctype="multipart/form-data" class="w-100 px-3">
                        <div class="mb-4">
                            <input type="file" class="form-control border border-secondary bg-dark text-white"
                                name="archivo" required />
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                            <i class="fa-solid fa-cloud-arrow-up me-2"></i>Cargar PDF
                        </button>
                    </form>

                    <div th:if="${mensajeExito}" class="alert alert-success mt-3 w-100" th:text="${mensajeExito}"></div>
                    <div th:if="${mensajeError}" class="alert alert-danger mt-3 w-100" th:text="${mensajeError}"></div>
                </div>
            </div>

            <div class="col-md-7 d-flex">
                <div class="tarjeta card w-100 p-4 d-flex flex-column">

                    <div
                        class="cabecera border-bottom border-black pb-3 mb-3 d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0">🤖 Chat con Ollama</h5>
                            <small>Modelo local</small>
                        </div>
                        <form th:action="@{/reiniciar-sesion}" method="post">
                            <button type="submit" class="btn btn-outline-black btn-sm">
                                <i class="fa-solid fa-trash-can me-2"></i>Reiniciar sesión
                            </button>
                        </form>
                    </div>

                    <div class="chat flex-grow-1 overflow-y-auto mb-3 pe-2"
                        style="max-height: 450px; min-height: 350px;">

                        <div th:if="${#lists.isEmpty(historicoConversacion)}"
                            class="h-100 d-flex align-items-center justify-content-center text-center">
                            <p class="texto-chat">Aún no hay preguntas. ¡Sube un PDF e inicia la conversación!</p>
                        </div>

                        <div th:each="mensaje : ${historicoConversacion}" class="mb-3">

                            <div th:if="${mensaje.startsWith('Usuario:')}"
                                class="d-flex justify-content-end align-items-start mb-3">
                                <div class="mensaje user-bubble text-white p-3 rounded-3 me-2" style="max-width: 75%;">
                                    <span th:text="${mensaje.substring(9)}">Mensaje del usuario</span>
                                </div>
                                <div class="avatar bg-info text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 fw-bold shadow-sm"
                                    style="width: 40px; height: 40px;">
                                    U
                                </div>
                            </div>

                            <div th:if="${mensaje.startsWith('Ollama:')}"
                                class="d-flex justify-content-start align-items-start mb-3">
                                <div class="avatar bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-2 flex-shrink-0 fw-bold shadow-sm"
                                    style="width: 40px; height: 40px;">
                                    IA
                                </div>
                                <div class="mensaje ia-bubble text-white p-3 rounded-3" style="max-width: 75%;">
                                    <span th:text="${mensaje.substring(8)}">Respuesta de Ollama</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="footer-chat mt-auto">
                        <form id="form-chat" th:action="@{/ia}" method="post" class="w-100">
                            <div class="input-group shadow-sm">
                                <input type="text" name="mensaje"
                                    class="form-control bg-dark text-white border-secondary"
                                    placeholder="Escribe tu pregunta para Ollama..." required autocomplete="off">
                                <button type="submit" class="btn btn-primary px-4 border-secondary fw-bold">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>

                        <div id="cargando-respuesta" class="d-none text-center py-2">
                            <div class="spinner-border text-info" role="status">
                                <span class="visually-hidden">Procesando...</span>
                            </div>
                            <p class="text-muted small mt-1 mb-0">Ollama está procesando tu pregunta...</p>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
    <footer class="bg-dark text-center text-white mt-auto py-3 border-top border-secondary">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-md-start text-center">
                    Daniel Millan 2026 © Todos los derechos reservados.
                </div>
                <div class="col-md-6 text-md-end text-center mt-2 mt-md-0">
                    <a class="btn btn-outline-light btn-floating btn-sm mx-1"
                        href="https://www.linkedin.com/in/danielmillan0/" target="_blank" role="button">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a class="btn btn-outline-light btn-floating btn-sm mx-1" href="https://github.com/Dmillan00"
                        target="_blank" role="button">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('form-chat').addEventListener('submit', function () {
            this.classList.add('d-none');
            document.getElementById('cargando-respuesta').classList.remove('d-none');
        });
    </script>

</body>

</html>
